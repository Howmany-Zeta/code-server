# Startu / monorepo 示例配置 — 复制为 startu.local.yaml 后按需修改（startu.local.yaml 已 gitignore）
#
# 使用方式（在 auth-docen 根目录，且已 npm run build、vscode-main 已 compile）:
#   unset VSCODE_IPC_HOOK_CLI   # 在 Cursor/VS Code 集成终端内必须，否则报错 “Please specify at least one file or folder”
#   export JWT_SECRET='与 express-gateway 的 JWT_SECRET 完全一致'
#   CODE_SERVER_CONFIG="$(pwd)/config/startu.local.yaml" node out/node/entry.js
#
# 或先把本文件复制到默认路径:
#   mkdir -p ~/.config/code-server
#   cp config/startu.config.example.yaml ~/.config/code-server/config.yaml
#   # 编辑 config.yaml，然后直接: code-server

# 仅本机访问可用 127.0.0.1；若需局域网/Tailscale 用浏览器 IP 访问，用 0.0.0.0
bind-addr: 127.0.0.1:8080
# 只能是 password | gateway | none，不要把 JWT_SECRET 写在本行
auth: gateway
cert: false

# 登录页内嵌的网关 API 基址（auth-gateway-ui fetch 目标）。必须与浏览器实际访问网关的 URL 一致：
# 若页面是 http://100.x.x.x:8082/login，此处应为 http://100.x.x.x:3001（不要用 localhost，除非浏览器只在本机打开）。
# 也可用环境变量: export STARTU_GATEWAY_URL=http://100.x.x.x:3001
# gateway-url: http://127.0.0.1:3001

# 二选一（推荐生产用环境变量，避免写进文件）:
# - 设置环境变量 JWT_SECRET（与 express-gateway 相同）
# - 或在此填写（勿提交真实密钥）:
# jwt-secret: "your-shared-secret-with-express-gateway"

# 可选：浏览器登录页「外部登录」按钮跳转（如独立部署的 auth-chatbot）
# 会附带 ?return_to=<当前站点绝对 URL>
# auth-login-url: "http://localhost:3000/login"

# 可选：与扩展默认一致时无需改；仅当网关不在 3001 时，在工作区/用户设置里配置 authChatbot.gatewayUrl
# （此项不是 code-server YAML 字段，仅作备忘）
